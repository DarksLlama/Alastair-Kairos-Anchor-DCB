<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARACTER RELATIONS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            font-family: 'Courier New', monospace;
            color: white;
            margin-top: 15%;
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent 50%, rgba(0, 255, 65, 0.03) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            animation: scan 8s linear infinite;
            z-index: 1000;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            border: 2px solid white;
            padding: 20px;
            margin-bottom: 30px;
            background: rgba(20, 20, 20, 0.95);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            text-align: center;
            position: relative;
        }

        .back-button {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: 2px solid #ffaa00;
            color: #ffaa00;
            padding: 8px 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .back-button:hover {
            background: #ffaa00;
            color: #0a0e27;
            box-shadow: 0 0 15px #ffaa00;
        }

        .header h1 {
            font-size: 28px;
            letter-spacing: 6px;
            text-shadow: 0 0 10px white;
            margin-bottom: 10px;
        }

        .header .status {
            font-size: 12px;
            color: white;
        }

        .faction-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .faction-button {
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid white;
            color: white;
            padding: 30px;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .faction-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: white;
            transition: left 0.3s;
            z-index: -1;
        }

        .faction-button:hover::before {
            left: 0;
        }

        .faction-button:hover {
            color: #0a0e27;
            box-shadow: 0 0 20px white;
            font-weight: bold;
            transform: translateY(-3px);
        }

        .faction-button .icon {
            display: block;
            font-size: 32px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .faction-menu {
                grid-template-columns: 1fr;
            }

            .back-button {
                position: static;
                transform: none;
                display: block;
                width: fit-content;
                margin: 0 auto 15px;
            }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div class="container">
        <div class="header">
            <a href="../Login.html" class="back-button">◄ RETURN</a>
            <h1>⬢ RELATIONS DATABASE ⬢</h1>
            <div class="status">[ MODULE: RELATIONS | STATUS: ACTIVE ]</div>
        </div>

        <div class="faction-menu">
            <a href="Familly.html" class="faction-button">
                FAMILY
            </a>
            <a href="Site.html" class="faction-button">
                SITE
            </a>
            <a href="CI.html" class="faction-button">
                CI
            </a>
            <a href="Town.html" class="faction-button">
                TOWN
            </a>
        </div>
    </div>
</body>
</html>
